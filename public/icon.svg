<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="#1a1a1a"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="230" r="168" fill="none" stroke="#c8a96e" stroke-width="6"/>
  <!-- Inner fine ring -->
  <circle cx="256" cy="230" r="154" fill="none" stroke="#c8a96e" stroke-width="1.5" opacity="0.5"/>

  <!-- M monogram -->
  <text
    x="256" y="308"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="195"
    font-weight="700"
    fill="#c8a96e"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-4">M</text>

  <!-- Divider line -->
  <line x1="96" y1="418" x2="416" y2="418" stroke="#c8a96e" stroke-width="1" opacity="0.4"/>

  <!-- Brand name -->
  <text
    x="256" y="452"
    font-family="'Arial', sans-serif"
    font-size="28"
    font-weight="600"
    fill="#a08050"
    text-anchor="middle"
    letter-spacing="6">INSIDEZ</text>
  <text
    x="256" y="484"
    font-family="'Arial', sans-serif"
    font-size="22"
    font-weight="400"
    fill="#707070"
    text-anchor="middle"
    letter-spacing="4">SAPLINGS</text>
</svg>
